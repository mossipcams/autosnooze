pause:
  name: Snooze
  description: Snooze automation(s) for a specified duration or until a specific time. They will automatically wake up when the time expires.
  target:
    entity:
      - domain: automation
  fields:
    entity_id:
      name: Automation
      description: Automation(s) to snooze.
      required: true
      selector:
        entity:
          domain: automation
          multiple: true
    days:
      name: Days
      description: Number of days to snooze (used with duration-based scheduling).
      default: 0
      selector:
        number:
          min: 0
          max: 365
          mode: box
    hours:
      name: Hours
      description: Number of hours to snooze (used with duration-based scheduling).
      default: 0
      selector:
        number:
          min: 0
          max: 23
          mode: box
    minutes:
      name: Minutes
      description: Number of minutes to snooze (used with duration-based scheduling).
      default: 0
      selector:
        number:
          min: 0
          max: 59
          mode: box
    disable_at:
      name: Disable At
      description: Schedule when to disable the automation (future datetime). If not set, disables immediately.
      selector:
        datetime:
    resume_at:
      name: Resume At
      description: Specific datetime when to re-enable the automation. Accepts template-rendered datetime strings. Use instead of duration fields.
      selector:
        datetime:
    resume_at_time:
      name: Resume At Time
      description: Local time of day when to re-enable the automation. Resumes today if the time is still upcoming, otherwise tomorrow. Use instead of duration fields.
      selector:
        time:
    resume_preset:
      name: Resume Preset
      description: Built-in resume time. Use instead of duration fields.
      selector:
        select:
          options:
            - label: End of day (next midnight)
              value: end_of_day
            - label: Next morning (08:00)
              value: next_morning
            - label: Next sunrise
              value: next_sunrise
            - label: Next sunset
              value: next_sunset
    notification_trigger:
      name: Notification Trigger
      description: Choose whether to notify when the snooze starts, shortly before it ends, or when it ends.
      default: none
      selector:
        select:
          options:
            - label: No notification
              value: none
            - label: When snooze starts
              value: start
            - label: Before snooze ends
              value: about_to_end
            - label: When snooze ends
              value: end
    notification_lead_minutes:
      name: Notification Lead Minutes
      description: Required when Notification Trigger is set to Before snooze ends.
      selector:
        select:
          options:
            - label: 30 minutes
              value: "30"
            - label: 1 hour
              value: "60"
            - label: 2 hours
              value: "120"
            - label: 4 hours
              value: "240"
    confirm:
      name: Confirm Labeled Automations
      description: Set to true to snooze automations tagged with autosnooze_confirm or detected as critical.
      default: false
      selector:
        boolean:

cancel:
  name: Wake
  description: Wake up snoozed automation(s) and re-enable them immediately.
  fields:
    entity_id:
      name: Automation
      description: Automation(s) to wake.
      required: true
      selector:
        entity:
          domain: automation
          multiple: true

cancel_all:
  name: Wake All
  description: Wake all snoozed automations and re-enable them immediately.

clear_notification:
  name: Clear Notification
  description: Remove notification settings from currently snoozed automation(s).
  fields:
    entity_id:
      name: Automation
      description: Snoozed automation(s) whose notification settings should be cleared.
      required: true
      selector:
        entity:
          domain: automation
          multiple: true

