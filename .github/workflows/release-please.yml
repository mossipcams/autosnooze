name: Release Please

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      pr: ${{ steps.release.outputs.pr }}
      prs_created: ${{ steps.release.outputs.prs_created }}
    steps:
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  refresh-release-pr-artifacts:
    needs: release-please
    if: ${{ needs.release-please.outputs.prs_created == 'true' && needs.release-please.outputs.pr != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: write
      checks: write
      statuses: write
    steps:
      - name: Parse release PR metadata
        id: pr
        env:
          RELEASE_PLEASE_PR: ${{ needs.release-please.outputs.pr }}
        run: |
          branch="$(printf '%s' "$RELEASE_PLEASE_PR" | jq -r '.headBranchName // empty')"
          if [ -z "$branch" ]; then
            echo "Unable to determine headBranchName from Release Please output"
            exit 1
          fi

          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Checkout release PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20.19.0'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Rebuild generated card artifact
        run: npm run build

      - name: Commit refreshed generated card artifact
        id: artifact
        env:
          BRANCH_NAME: ${{ steps.pr.outputs.branch }}
        run: |
          if git diff --quiet -- custom_components/autosnooze/www/autosnooze-card.js custom_components/autosnooze/www/autosnooze-card.js.map; then
            echo "Generated artifact already up to date."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add custom_components/autosnooze/www/autosnooze-card.js custom_components/autosnooze/www/autosnooze-card.js.map
            git commit -m "build: refresh generated card artifact for release PR"
            git push origin "HEAD:$BRANCH_NAME"
          fi
          echo "head-sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Dispatch required Build workflow for release PR and mirror result
        env:
          BRANCH_NAME: ${{ steps.pr.outputs.branch }}
          HEAD_SHA: ${{ steps.artifact.outputs.head-sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh workflow run build.yml --ref "$BRANCH_NAME"

          RUN_ID=""
          for ((attempt = 1; attempt <= 30; attempt++)); do
            RUN_ID="$(
              gh run list \
                --workflow build.yml \
                --branch "$BRANCH_NAME" \
                --event workflow_dispatch \
                --json databaseId,createdAt,headSha \
                --jq '[.[] | select(.headSha == "'"$HEAD_SHA"'" and .createdAt >= "'"$started_at"'")] | sort_by(.createdAt) | last | .databaseId // empty'
            )"

            if [ -n "$RUN_ID" ]; then
              break
            fi

            sleep 5
          done

          if [ -z "$RUN_ID" ]; then
            echo "Unable to find dispatched Build workflow run for $BRANCH_NAME at $HEAD_SHA."
            exit 1
          fi

          set +e
          gh run watch "$RUN_ID" --exit-status --interval 10
          watch_status=$?
          set -e

          run_json="$(gh run view "$RUN_ID" --json conclusion,url)"
          conclusion="$(printf '%s' "$run_json" | jq -r '.conclusion // empty')"
          target_url="$(printf '%s' "$run_json" | jq -r '.url // empty')"

          case "$conclusion" in
            success)
              status_state="success"
              check_conclusion="success"
              ;;
            cancelled|timed_out|action_required|neutral|skipped)
              status_state="failure"
              check_conclusion="$conclusion"
              ;;
            *)
              status_state="failure"
              check_conclusion="failure"
              ;;
          esac

          gh api \
            -X POST \
            "repos/${GITHUB_REPOSITORY}/check-runs" \
            -f name="build" \
            -f head_sha="$HEAD_SHA" \
            -f status="completed" \
            -f conclusion="$check_conclusion" \
            -f details_url="$target_url" \
            -f "output[title]=Build workflow $conclusion" \
            -f "output[summary]=Mirrored from workflow_dispatch run $RUN_ID."

          gh api \
            -X POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${HEAD_SHA}" \
            -f state="$status_state" \
            -f context="build" \
            -f target_url="$target_url" \
            -f description="Build workflow $conclusion"

          if [ "$watch_status" -ne 0 ] || [ "$status_state" != "success" ]; then
            exit 1
          fi

  sync-existing-release-pr:
    needs: release-please
    # Bot pushes to the release PR branch do not re-trigger pull_request Build workflows,
    # so keep the open Release Please PR synced and mirror a successful Build check.
    # workflow_dispatch must run this path too; only refresh-release-pr-artifacts handles brand-new PRs.
    if: ${{ needs.release-please.result == 'success' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && needs.release-please.outputs.prs_created != 'true')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      actions: write
      checks: write
      statuses: write
    steps:
      - name: Find existing Release Please PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_json="$(
            gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --state open \
              --label "autorelease: pending" \
              --json number,headRefName,author \
              --jq '[.[] | select(.headRefName | startswith("release-please--branches--main--components--")) | select(.author.is_bot == true)] | first // {}'
          )"

          pr_number="$(printf '%s' "$pr_json" | jq -r '.number // empty')"
          branch_name="$(printf '%s' "$pr_json" | jq -r '.headRefName // empty')"

          if [ -z "$pr_number" ] || [ -z "$branch_name" ]; then
            echo "No open Release Please PR found."
            echo "number=" >> "$GITHUB_OUTPUT"
            echo "branch=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "branch=$branch_name" >> "$GITHUB_OUTPUT"

      - name: Update Release Please PR branch from main
        if: ${{ steps.pr.outputs.number != '' && startsWith(steps.pr.outputs.branch, 'release-please--branches--main--components--') }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: gh pr update-branch "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"

      - name: Checkout synced release PR branch
        if: ${{ steps.pr.outputs.branch != '' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.branch }}

      - name: Setup Node.js for synced release PR
        if: ${{ steps.pr.outputs.branch != '' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20.19.0'
          cache: 'npm'

      - name: Install npm dependencies for synced release PR
        if: ${{ steps.pr.outputs.branch != '' }}
        run: npm ci

      - name: Rebuild synced generated card artifact
        if: ${{ steps.pr.outputs.branch != '' }}
        run: npm run build

      - name: Commit synced generated card artifact
        id: synced-artifact
        if: ${{ steps.pr.outputs.branch != '' }}
        env:
          BRANCH_NAME: ${{ steps.pr.outputs.branch }}
        run: |
          if git diff --quiet -- custom_components/autosnooze/www/autosnooze-card.js custom_components/autosnooze/www/autosnooze-card.js.map; then
            echo "Synced generated artifact already up to date."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add custom_components/autosnooze/www/autosnooze-card.js custom_components/autosnooze/www/autosnooze-card.js.map
            git commit -m "build: refresh generated card artifact for synced release PR"
            git push origin "HEAD:$BRANCH_NAME"
          fi
          echo "head-sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Dispatch required Build workflow for synced release PR and mirror result
        if: ${{ steps.pr.outputs.branch != '' }}
        env:
          BRANCH_NAME: ${{ steps.pr.outputs.branch }}
          HEAD_SHA: ${{ steps.synced-artifact.outputs.head-sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh workflow run build.yml --ref "$BRANCH_NAME"

          RUN_ID=""
          for ((attempt = 1; attempt <= 30; attempt++)); do
            RUN_ID="$(
              gh run list \
                --workflow build.yml \
                --branch "$BRANCH_NAME" \
                --event workflow_dispatch \
                --json databaseId,createdAt,headSha \
                --jq '[.[] | select(.headSha == "'"$HEAD_SHA"'" and .createdAt >= "'"$started_at"'")] | sort_by(.createdAt) | last | .databaseId // empty'
            )"

            if [ -n "$RUN_ID" ]; then
              break
            fi

            sleep 5
          done

          if [ -z "$RUN_ID" ]; then
            echo "Unable to find dispatched Build workflow run for $BRANCH_NAME at $HEAD_SHA."
            exit 1
          fi

          set +e
          gh run watch "$RUN_ID" --exit-status --interval 10
          watch_status=$?
          set -e

          run_json="$(gh run view "$RUN_ID" --json conclusion,url)"
          conclusion="$(printf '%s' "$run_json" | jq -r '.conclusion // empty')"
          target_url="$(printf '%s' "$run_json" | jq -r '.url // empty')"

          case "$conclusion" in
            success)
              status_state="success"
              check_conclusion="success"
              ;;
            cancelled|timed_out|action_required|neutral|skipped)
              status_state="failure"
              check_conclusion="$conclusion"
              ;;
            *)
              status_state="failure"
              check_conclusion="failure"
              ;;
          esac

          gh api \
            -X POST \
            "repos/${GITHUB_REPOSITORY}/check-runs" \
            -f name="build" \
            -f head_sha="$HEAD_SHA" \
            -f status="completed" \
            -f conclusion="$check_conclusion" \
            -f details_url="$target_url" \
            -f "output[title]=Build workflow $conclusion" \
            -f "output[summary]=Mirrored from workflow_dispatch run $RUN_ID."

          gh api \
            -X POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${HEAD_SHA}" \
            -f state="$status_state" \
            -f context="build" \
            -f target_url="$target_url" \
            -f description="Build workflow $conclusion"

          if [ "$watch_status" -ne 0 ] || [ "$status_state" != "success" ]; then
            exit 1
          fi
